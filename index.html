svg{display:block}
input[type=range]{-webkit-appearance:none;width:100%;height:6px;border-radius:99px;background:var(--line);outline:none}

.track::-webkit-scrollbar{display:none}

.nav .in{max-width:480px;margin:0 auto;display:flex;padding:8px 0 calc(8px + env(safe-area-inset-bottom))}

const I={
  guitar:'<svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M11.9 12.1 20 4l-1-1-8.1 8.1"/><circle cx="8" cy="16" r="5"/><circle cx="8" cy="16" r="1.5"/></svg>',

  gauge:'<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M12 15a3 3 0 1 0 0-6 3 3 0 0 0 0 6z"/><path d="m14 13 4-4"/><path d="M3 12a9 9 0 0 1 18 0"/></svg>',

  check:'<svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><path d="M5 13l4 4L19 7"/></svg>',
  lock:'<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="4" y="10" width="16" height="11" rx="2"/><path d="M8 10V7a4 4 0 0 1 8 0v3"/></svg>',
  star:'<svg width="16" height="16" viewBox="0 0 24 24" fill="currentColor"><path d="m12 2 3 6.5 7 .6-5.3 4.6L18.2 21 12 17.3 5.8 21l1.5-7.3L2 9.1l7-.6z"/></svg>',
  music:'<svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M9 18V5l10-2v13"/><circle cx="6" cy="18" r="3"/><circle cx="16" cy="16" r="3"/></svg>',

/* ============================ ESTADO ============================ */
const S={view:"home",fing:"multi",bpm:80,done:{},activeId:null,mode:"passo",idx:0,playing:false,guiding:false,hits:{},
  ear:{target:null,score:0,streak:0,st:"idle",picked:null}};
function save(){try{localStorage.setItem("violao:v1",JSON.stringify({done:S.done,fing:S.fing,bpm:S.bpm}))}catch(e){}}
(function load(){try{const r=JSON.parse(localStorage.getItem("violao:v1")||"{}");if(r.done)S.done=r.done;if(r.fing)S.fing=r.fing;if(r.bpm)S.bpm=r.bpm}catch(e){}})();

/* ============================ ÁUDIO ============================ */
let AC=null;
function ac(){if(!AC)AC=new(window.AudioContext||window.webkitAudioContext)();if(AC.state==="suspended")AC.resume();return AC;}
/* Timbre de violão — corda dedilhada por Karplus-Strong */
const ksCache=new Map();
function ksGen(freq){
  const a=ac(),sr=a.sampleRate,len=Math.floor(sr*1.9),N=Math.max(2,Math.round(sr/freq));
  const dl=new Float32Array(N);for(let i=0;i<N;i++)dl[i]=Math.random()*2-1;
  for(let p=0;p<2;p++){let prev=dl[N-1];for(let i=0;i<N;i++){const c=dl[i];dl[i]=.5*(c+prev);prev=c;}} // suaviza a palhetada (nylon)
  const out=new Float32Array(len),decay=0.9966+Math.random()*0.0014;let ptr=0;
  for(let i=0;i<len;i++){const nx=(ptr+1)%N,v=decay*.5*(dl[ptr]+dl[nx]);out[i]=dl[ptr];dl[ptr]=v;ptr=nx;}
  let peak=1e-6;for(let i=0;i<len;i++){const b=Math.abs(out[i]);if(b>peak)peak=b;}
  const g=.9/peak;for(let i=0;i<len;i++)out[i]*=g;
  const fade=Math.floor(sr*.03);for(let i=0;i<fade;i++)out[len-1-i]*=i/fade; // evita clique no fim
  const ab=a.createBuffer(1,len,sr);ab.copyToChannel(out,0);return ab;
}
function ksVar(freq){const k=Math.round(freq*4);if(!ksCache.has(k))ksCache.set(k,[ksGen(freq),ksGen(freq),ksGen(freq)]);return ksCache.get(k);}
let BODY=null;
function makeImpulse(a,dur,dec){const sr=a.sampleRate,len=Math.floor(sr*dur),b=a.createBuffer(2,len,sr);
  for(let ch=0;ch<2;ch++){const d=b.getChannelData(ch);for(let i=0;i<len;i++)d[i]=(Math.random()*2-1)*Math.pow(1-i/len,dec);}return b;}
function body(){if(BODY)return BODY;const a=ac();
  const hp=a.createBiquadFilter();hp.type="highpass";hp.frequency.value=80;
  const warm=a.createBiquadFilter();warm.type="peaking";warm.frequency.value=240;warm.Q.value=.7;warm.gain.value=3; // aquece os médios-graves
  const pk=a.createBiquadFilter();pk.type="peaking";pk.frequency.value=110;pk.Q.value=.8;pk.gain.value=4;             // ressonância do corpo
  const lp=a.createBiquadFilter();lp.type="lowpass";lp.frequency.value=3800;lp.Q.value=.4;                            // tira o excesso de brilho (nylon)
  const g=a.createGain();g.gain.value=.85;
  hp.connect(warm);warm.connect(pk);pk.connect(lp);lp.connect(g);
  g.connect(a.destination);                                     // sinal direto
  const conv=a.createConvolver();conv.buffer=makeImpulse(a,0.8,3.2);
  const wet=a.createGain();wet.gain.value=.11;                  // reverb sutil = "ar"/corpo
  g.connect(conv);conv.connect(wet);wet.connect(a.destination);
  BODY=hp;return BODY;}
function tone(freq,dur=0.55){
  const a=ac(),t=a.currentTime,arr=ksVar(freq),buf=arr[(Math.random()*arr.length)|0];
  const src=a.createBufferSource();src.buffer=buf;
  const env=a.createGain(),rel=.12,atk=.006,hold=Math.max(.02,dur-.02);
  env.gain.setValueAtTime(.0001,t);env.gain.linearRampToValueAtTime(1,t+atk);   // ataque macio (sem clique)
  env.gain.setValueAtTime(1,t+hold);env.gain.exponentialRampToValueAtTime(.0008,t+hold+rel);
  src.connect(env);env.connect(body());src.start(t);src.stop(t+hold+rel+.03);
  try{MIC.playUntil=performance.now()+(hold+rel)*1000+140;}catch(e){}            // microfone ignora o som do próprio app
}
document.addEventListener("pointerdown",()=>{try{ac()}catch(e){}},{once:true});

/* ============================ PITCH / MIC ============================ */
const NS=["C","C#","D","D#","E","F","F#","G","G#","A","A#","B"];
function noteFromFreq(f){const n=12*Math.log2(f/440)+69,midi=Math.round(n);return{pc:NS[((midi%12)+12)%12],cents:Math.round((n-midi)*100)};}
function autoCorr(buf,sr){
  let SIZE=buf.length,rms=0;for(let i=0;i<SIZE;i++)rms+=buf[i]*buf[i];rms=Math.sqrt(rms/SIZE);
  if(rms<0.012)return{f:-1,rms};
  let r1=0,r2=SIZE-1,th=0.2;
  for(let i=0;i<SIZE/2;i++)if(Math.abs(buf[i])<th){r1=i;break;}
  for(let i=1;i<SIZE/2;i++)if(Math.abs(buf[SIZE-i])<th){r2=SIZE-i;break;}
  const b=buf.slice(r1,r2);SIZE=b.length;const c=new Array(SIZE).fill(0);
  for(let i=0;i<SIZE;i++)for(let j=0;j<SIZE-i;j++)c[i]+=b[j]*b[j+i];
  let d=0;while(d<SIZE-1&&c[d]>c[d+1])d++;
  let mx=-1,pos=-1;for(let i=d;i<SIZE;i++)if(c[i]>mx){mx=c[i];pos=i;}
  let T0=pos;const x1=c[T0-1]||0,x2=c[T0]||0,x3=c[T0+1]||0,a=(x1+x3-2*x2)/2,bb=(x3-x1)/2;if(a)T0=T0-bb/(2*a);
  const f=sr/T0;return{f:(f>60&&f<1400)?f:-1,rms};
}
const MIC={on:false,err:"",stream:null,ana:null,raf:null,live:{pc:null,cents:0,freq:0,level:0},match:null,hold:0,lastPc:null,onLive:null};
async function micStart(){
  MIC.err="";
  try{
    const st=await navigator.mediaDevices.getUserMedia({audio:{echoCancellation:false,noiseSuppression:false,autoGainControl:false}});
    MIC.stream=st;const a=ac(),src=a.createMediaStreamSource(st),ana=a.createAnalyser();ana.fftSize=2048;src.connect(ana);MIC.ana=ana;
    const buf=new Float32Array(ana.fftSize);MIC.on=true;let lastProc=0;
    const loop=()=>{
      MIC.raf=requestAnimationFrame(loop);
      const now=performance.now();
      if(now-lastProc<55)return;            // analisa ~18x/s: leitura estável, menos CPU
      lastProc=now;
      ana.getFloatTimeDomainData(buf);const{f,rms}=autoCorr(buf,a.sampleRate);
      let info={pc:null,cents:0,freq:0,level:Math.min(1,rms*8)};
      if(f>0){const nf=noteFromFreq(f);info={pc:nf.pc,cents:nf.cents,freq:f,level:Math.min(1,rms*8)};}
      MIC.live=info;if(MIC.onLive)MIC.onLive(info);
      const mt=MIC.match, appSoando=now<(MIC.playUntil||0);   // ignora o som do próprio app
      if(mt&&info.pc&&!appSoando){
        if(info.pc===mt.pc&&Math.abs(info.cents)<45){MIC.hold=info.pc===MIC.lastPc?MIC.hold+1:1;MIC.lastPc=info.pc;
          if(MIC.hold>=mt.need){const cb=mt.onHit;MIC.match=null;MIC.hold=0;cb&&cb();}}
        else{MIC.hold=Math.max(0,MIC.hold-1);MIC.lastPc=info.pc;}
      }
    };
    MIC.raf=requestAnimationFrame(loop);return true;
  }catch(e){
    MIC.err=(e&&e.name==="NotAllowedError")?"Permissão de microfone negada. Libere nas configurações do navegador.":"Microfone indisponível neste dispositivo.";
    MIC.on=false;return false;
  }
}
function micStop(){if(MIC.raf)cancelAnimationFrame(MIC.raf);if(MIC.stream)MIC.stream.getTracks().forEach(t=>t.stop());MIC.stream=null;MIC.ana=null;MIC.on=false;MIC.match=null;MIC.onLive=null;}

        ${[-50,-25,25,50].map(t=>`<div style="position:absolute;left:${50+t}%;top:8px;bottom:8px;width:1px;background:var(--line)"></div>`).join("")}
        <div id="tNeedle" style="position:absolute;top:4px;left:calc(50% - 8px);width:16px;height:36px;border-radius:6px;background:var(--amber);transition:left .08s linear;box-shadow:0 0 16px var(--amber)"></div>
      </div>
      <div id="tMsg" style="font-weight:800;margin-top:10px;color:var(--mut)"></div>

    <div id="tStrings" style="display:grid;grid-template-columns:repeat(6,1fr);gap:8px"></div>
  </div>`;
}
const TUNING=[["6ª","E"],["5ª","A"],["4ª","D"],["3ª","G"],["2ª","B"],["1ª","E"]];
function paintTunerStrings(pc){
  const box=el("tStrings");if(!box)return;
  box.innerHTML=TUNING.map(([c,nt])=>{const hit=pc===nt;
    return `<div class="card" style="padding:10px;text-align:center;border:1px solid ${hit?"var(--amber)":"var(--line)"}">
      <div style="font-weight:800;color:${hit?"var(--amber)":"var(--ink)"}">${PC_PT[nt]}</div><div class="mut" style="font-size:11px">${c}</div></div>`;}).join("");
}
/* leitura estabilizada do afinador: suaviza a frequência e repinta calmo (~11x/s) */
const TUN={f:0,sil:0,t:0};
function paintTuner(live){
  const nn=el("tNote");if(!nn)return;
  const now=performance.now();
  if(live.freq>0){TUN.sil=0;TUN.f=TUN.f?TUN.f*0.82+live.freq*0.18:live.freq;}   // média móvel
  else if(++TUN.sil>10){TUN.f=0;}                                              // silêncio: limpa após ~0.5s
  if(now-TUN.t<90)return;                                                       // repinta sem correria
  TUN.t=now;
  const has=TUN.f>0,info=has?noteFromFreq(TUN.f):{pc:null,cents:0};
  const inTune=has&&Math.abs(info.cents)<=5,cents=has?Math.max(-50,Math.min(50,info.cents)):0;
  nn.textContent=has?PC_PT[info.pc]:"—";nn.style.color=inTune?"var(--green)":"var(--amber)";
  el("tHz").textContent=has?TUN.f.toFixed(1)+" Hz":"aguardando som…";
  const nd=el("tNeedle");
  nd.style.left=`calc(${cents+50}% - 8px)`;nd.style.background=inTune?"var(--green)":"var(--amber)";nd.style.boxShadow=`0 0 16px ${inTune?"var(--green)":"var(--amber)"}`;
  const msg=el("tMsg");msg.textContent=has?(inTune?"Afinada":(info.cents<0?"↓ um pouco baixa":"↑ um pouco alta")):"";msg.style.color=inTune?"var(--green)":"var(--mut)";
  paintTunerStrings(has?info.pc:null);
}

/* ============================ AÇÕES ============================ */
let playFlag=false;
async function playAll(){
  const s=MEL[S.activeId];
  if(S.playing){playFlag=true;S.playing=false;setPlayBtn(false);return;}
  S.playing=true;playFlag=false;setPlayBtn(true);
  for(let i=0;i<s.notes.length;i++){if(playFlag)break;S.idx=i;paintPractice();tone(N[s.notes[i].n].freq,Math.min(1.1,s.notes[i].b*spb()*.9));await sleep(s.notes[i].b*spb()*1000);}
  S.playing=false;playFlag=false;setPlayBtn(false);
}
function setPlayBtn(on){const b=$("[data-playall]");if(!b)return;b.className="pill "+(on?"red":"green");b.style.cssText="width:100%;display:flex;justify-content:center;gap:8px";b.innerHTML=(on?I.stop+" Parar":I.play+" Tocar melodia inteira");}

function waitNote(pc){return new Promise(res=>{MIC.match={pc,need:5,onHit:res};
  const iv=setInterval(()=>{if(!S.guiding){clearInterval(iv);MIC.match=null;res(false);}},200);
  const orig=MIC.match.onHit;MIC.match.onHit=()=>{clearInterval(iv);orig(true);};});}
async function runGuided(){
  const s=MEL[S.activeId];
  if(!MIC.on){const ok=await micStart();render();if(!ok)return;}
  MIC.onLive=(live)=>{if(S.view==="practice"&&S.mode==="guiado")paintMeter(live,N[s.notes[S.idx].n].pc);};
  S.guiding=true;S.hits={};S.idx=0;setGuideBtn(true);paintPractice();
  for(let i=0;i<s.notes.length;i++){if(!S.guiding)return;S.idx=i;paintPractice();tone(N[s.notes[i].n].freq,.5);
    await sleep(420);const ok=await waitNote(N[s.notes[i].n].pc);if(!S.guiding)return;
    if(ok){S.hits[i]=true;flash("var(--green)");tone(N[s.notes[i].n].freq,.3);paintPractice();await sleep(240);}}
  if(S.guiding){S.done[S.activeId]=true;save();const dm=el("doneMsg");if(dm)dm.innerHTML=`<div style="background:var(--greenDim);color:var(--green);padding:12px;border-radius:12px;text-align:center;font-weight:800;margin-top:10px">Melodia completa! 🎉</div>`;}
  S.guiding=false;setGuideBtn(false);
}
function setGuideBtn(on){const b=$("[data-guide]");if(!b)return;b.className="pill "+(on?"red":"green");b.style.cssText="width:100%;display:flex;justify-content:center;gap:8px";b.innerHTML=on?(I.stop+" Parar"):(I.mic+" "+(MIC.on?"Começar acompanhamento":"Ativar microfone e começar"));}
function stopGuided(){S.guiding=false;MIC.match=null;setGuideBtn(false);}
function flash(color){const f=el("flash");if(!f)return;f.className="flash";f.style.background=color;setTimeout(()=>{f.style.background="transparent";},320);}

function stopAllLoops(){playFlag=true;S.playing=false;S.guiding=false;MIC.match=null;MIC.onLive=null;}
function go(view){stopAllLoops();if(view!=="tuner")micStop();S.view=view;render();if(view==="tuner"){MIC.onLive=(l)=>{if(S.view==="tuner")paintTuner(l);};}}

/* ============================ BIND ============================ */
function bind(){
  document.querySelectorAll("[data-nav]").forEach(b=>b.onclick=()=>go(b.dataset.nav));
  const back=$("[data-back]");if(back)back.onclick=()=>go("home");

  if(S.view==="home"){
    document.querySelectorAll("[data-open]").forEach(b=>b.onclick=()=>{stopAllLoops();micStop();S.activeId=b.dataset.open;S.mode="passo";S.idx=0;S.hits={};S.view="practice";render();});
  }
  if(S.view==="practice"){
    document.querySelectorAll("[data-mode]").forEach(b=>b.onclick=()=>{stopAllLoops();if(b.dataset.mode!=="guiado")micStop();S.mode=b.dataset.mode;S.idx=0;S.hits={};render();});
    const s=MEL[S.activeId];
    $("[data-hear]").onclick=()=>tone(N[s.notes[S.idx].n].freq,.6);
    document.querySelectorAll("[data-pick]").forEach(b=>b.onclick=()=>{S.idx=+b.dataset.pick;if(S.mode!=="guiado")tone(N[s.notes[S.idx].n].freq,.55);paintPractice();});
    const prev=$("[data-prev]");if(prev)prev.onclick=()=>{S.idx=Math.max(0,S.idx-1);paintPractice();};
    const next=$("[data-next]");if(next)next.onclick=()=>{S.idx=Math.min(s.notes.length-1,S.idx+1);tone(N[s.notes[S.idx].n].freq,.55);if(S.idx===s.notes.length-1){S.done[S.activeId]=true;save();}paintPractice();};
    const pa=$("[data-playall]");if(pa)pa.onclick=playAll;
    const mk=$("[data-mark]");if(mk)mk.onclick=()=>{S.done[S.activeId]=true;save();render();};
    const gd=$("[data-guide]");if(gd)gd.onclick=()=>{S.guiding?stopGuided():runGuided();};
    const bpm=el("bpm");if(bpm)bpm.oninput=()=>{S.bpm=+bpm.value;el("bpmLbl").textContent=S.bpm+" BPM";save();};
    document.querySelectorAll("[data-fing]").forEach(b=>b.onclick=()=>{S.fing=b.dataset.fing;save();render();});
  }
  if(S.view==="tuner"){
    const box=el("tunerCtl");
    if(!MIC.on&&!MIC.err)box.innerHTML=`<button class="pill green" data-tstart style="width:100%;display:flex;justify-content:center;gap:8px;margin-bottom:16px">${I.mic} Ativar microfone</button>`;
    const ts=$("[data-tstart]");if(ts)ts.onclick=async()=>{await micStart();render();MIC.onLive=(l)=>{if(S.view==="tuner")paintTuner(l);};};
    paintTunerStrings(MIC.live.pc);
  }
  if(S.view==="ear"){
    const pool=["Do","Re","Mi","Fa","Sol"];
    const st=$("[data-earstart]");if(st)st.onclick=()=>earNext();
    const hr=$("[data-earhear]");if(hr)hr.onclick=()=>{if(S.ear.target)tone(N[S.ear.target].freq,.7);};
    const nx=$("[data-earnext]");if(nx)nx.onclick=()=>earNext();
    document.querySelectorAll("[data-earguess]").forEach(b=>b.onclick=()=>earGuess(b.dataset.earguess));
  }
}
function earNext(){const pool=["Do","Re","Mi","Fa","Sol"];S.ear.target=pool[Math.floor(Math.random()*pool.length)];S.ear.st="guessing";S.ear.picked=null;render();setTimeout(()=>tone(N[S.ear.target].freq,.7),120);}
function earGuess(g){if(S.ear.st!=="guessing")return;S.ear.picked=g;if(g===S.ear.target){S.ear.score++;S.ear.streak++;S.ear.st="right";}else{S.ear.streak=0;S.ear.st="wrong";}render();}

/* ============================ START + SW ============================ */
render();
if("serviceWorker"in navigator){window.addEventListener("load",()=>navigator.serviceWorker.register("./sw.js").catch(()=>{}));}
</script>
</body>
</html>
